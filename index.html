<!DOCTYPE html>
<html>
<head>
  <title>Helping Mindsets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Helping Mindsets</h1>
  <div id="userInfo">👤 Not logged in</div>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button onclick="show('home')">🏠 Home</button>
    <button onclick="show('teacher')">🧑‍🏫 Teacher</button>
    <button onclick="show('student')">🎓 Student</button>
    <button onclick="show('auth')">🔐 Login</button>
  </aside>

  <!-- MAIN -->
  <main class="content">

    <!-- HOME -->
    <section id="home">
      <div class="card hero">
        <h2>🚀 Helping Mindsets</h2>
        <p>Interactive classroom platform</p>
      </div>
    </section>

    <!-- LOGIN -->
    <section id="auth" class="hidden">
      <div class="card">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
      </div>
    </section>

    <!-- TEACHER -->
    <section id="teacher" class="hidden">
      <div class="card">
        <h2>🧑‍🏫 Teacher Panel</h2>

        <button onclick="createClass()">➕ Create Class</button>
        <p id="classCode"></p>

        <button onclick="generateCodes()">🔑 Generate Student Codes</button>
        <ul id="codesList"></ul>
      </div>
    </section>

    <!-- STUDENT -->
    <section id="student" class="hidden">
      <div class="card">
        <h2>🎓 Student Join</h2>

        <input id="studentCode" placeholder="Enter code">
        <button onclick="join()">Join</button>

        <div id="studentDash" class="hidden">
          <h3>XP: <span id="xp">0</span></h3>
        </div>
      </div>
    </section>

    <!-- ADMIN -->
    <section id="admin" class="hidden">
      <div class="card admin">
        <h2>⚙️ Admin Panel</h2>

        <button onclick="giveXP()">⚡ Give Everyone +50 XP</button>
        <button onclick="resetXP()">🔄 Reset XP</button>
        <button onclick="doubleXP()">🔥 Double XP Mode</button>
        <button onclick="clearStudents()">🧹 Clear Students</button>
      </div>
    </section>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
