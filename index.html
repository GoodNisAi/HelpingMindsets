<!DOCTYPE html>
<html>
<head>
  <title>Helping Mindsets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Helping Mindsets</h1>
  <p id="userInfo"></p>
</header>

<nav>
  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('auth')">Login</button>
  <button onclick="showSection('teacher')">Teacher</button>
  <button onclick="showSection('student')">Student</button>
</nav>

<main>

<!-- HOME -->
<section id="home">
  <h2>Live Platform Stats</h2>
  <p>Teachers: <span id="teacherCount">0</span></p>
  <p>Classes: <span id="classCount">0</span></p>
  <p>Students: <span id="studentCount">0</span></p>
</section>

<!-- AUTH -->
<section id="auth" class="hidden">
  <h2>Teacher Login / Signup</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</section>

<!-- TEACHER -->
<section id="teacher" class="hidden">
  <h2>Teacher Dashboard</h2>

  <button onclick="createClass()">Create Class</button>
  <p id="classCode"></p>

  <input id="assignmentInput" placeholder="Assignment">
  <button onclick="addAssignment()">Add</button>

  <ul id="assignmentList"></ul>
  <ul id="studentList"></ul>
</section>

<!-- STUDENT -->
<section id="student" class="hidden">
  <input id="codeInput" placeholder="Class code">
  <input id="nameInput" placeholder="Name">
  <button onclick="joinClass()">Join</button>

  <div id="studentDashboard" class="hidden">
    <h3 id="welcome"></h3>
    <p>XP: <span id="xp">0</span></p>
    <ul id="studentAssignments"></ul>
  </div>
</section>

</main>

<script type="module" src="script.js"></script>
</body>
</html>
