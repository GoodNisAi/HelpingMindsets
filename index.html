<!DOCTYPE html>
<html>
<head>
  <title>Helping Mindsets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Helping Mindsets</h1>
  <p id="userInfo"></p>
</header>

<nav>
  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('auth')">Login</button>
  <button onclick="showSection('teacher')">Teacher</button>
  <button onclick="showSection('student')">Student</button>
</nav>

<main>

<!-- HOME -->
<section id="home">
  <h2>Live Stats</h2>
  <p>Teachers: <span id="teacherCount">0</span></p>
  <p>Classes: <span id="classCount">0</span></p>
</section>

<!-- AUTH -->
<section id="auth" class="hidden">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</section>

<!-- TEACHER -->
<section id="teacher" class="hidden">
  <h2>Teacher Dashboard</h2>

  <!-- ONLY SHOW AFTER LOGIN -->
  <div id="teacherPanel" class="hidden">

    <h3>Class Controls</h3>
    <button onclick="createClass()">Create New Class</button>
    <p id="classCode"></p>

    <h3>Student Codes</h3>
    <button onclick="generateStudentCodes()">Generate Student Codes</button>
    <ul id="studentCodes"></ul>

    <h3>Subjects</h3>
    <input id="subjectInput" placeholder="New Subject">
    <button onclick="addSubject()">Add Subject</button>
    <ul id="subjectList"></ul>

  </div>

  <p id="loginWarning">You must be logged in as a teacher</p>
</section>

<!-- STUDENT -->
<section id="student" class="hidden">
  <h2>Student Join</h2>

  <input id="studentCodeInput" placeholder="Enter student code">
  <button onclick="joinWithCode()">Join</button>

  <div id="studentDashboard" class="hidden">
    <h3 id="studentName"></h3>
    <p>XP: <span id="xp">0</span></p>
  </div>
</section>

</main>

<script type="module" src="script.js"></script>
</body>
</html>
