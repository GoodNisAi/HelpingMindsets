<!DOCTYPE html>
<html>
<head>
  <title>Helping Mindsets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Helping Mindsets</h1>
  <div id="userInfo">👤 Not logged in</div>
</header>

<div class="app">

  <aside class="sidebar">
    <button onclick="show('home')">🏠 Home</button>
    <button onclick="show('teacher')">🧑‍🏫 Teacher</button>
    <button onclick="show('student')">🎓 Student</button>
    <button onclick="show('auth')">🔐 Login</button>
  </aside>

  <main class="content">

    <!-- HOME -->
    <section id="home">
      <div class="card">
        <h2>🚀 Helping Mindsets</h2>
        <p>Interactive classroom game</p>
      </div>
    </section>

    <!-- LOGIN -->
    <section id="auth" class="hidden">
      <div class="card">
        <h2>Login</h2>
        <button onclick="login()">Login as Teacher</button>
      </div>
    </section>

    <!-- TEACHER -->
    <section id="teacher" class="hidden">
      <div class="card">
        <h2>🧑‍🏫 Teacher</h2>

        <button onclick="createClass()">➕ Create Class</button>
        <p id="classCode"></p>

        <button onclick="generateCodes()">🔑 Generate Codes</button>
        <ul id="codesList"></ul>
      </div>
    </section>

    <!-- STUDENT -->
    <section id="student" class="hidden">
      <div class="card">
        <h2>🎓 Student</h2>

        <input id="studentCode" placeholder="Enter code">
        <button onclick="join()">Join</button>

        <div id="studentDash" class="hidden">
          <h3>XP: <span id="xp">0</span></h3>

          <button onclick="earnXP()">✨ Answer Question</button>
          <button onclick="randomEvent()">🎲 Mystery Event</button>

          <p id="gameStatus">Ready</p>
        </div>
      </div>
    </section>

    <!-- ADMIN -->
    <section id="admin" class="hidden">
      <div class="card admin">
        <h2>⚙️ Admin Control Center</h2>

        <button onclick="giveXP()">⚡ +50 XP All</button>
        <button onclick="resetXP()">🔄 Reset XP</button>
        <button onclick="toggleDoubleXP()">🔥 Toggle Double XP</button>
        <button onclick="randomBoost()">🎲 Random Boost</button>

        <ul id="adminStudentList"></ul>
        <p id="adminStatus">Status: Normal</p>
      </div>
    </section>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
