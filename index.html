<!DOCTYPE html>
<html>
<head>
  <title>Helping Mindsets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Helping Mindsets</h1>
  <div id="userInfo"></div>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button onclick="show('home')">🏠 Home</button>
    <button onclick="show('teacher')">🧑‍🏫 Teacher</button>
    <button onclick="show('student')">🎓 Student</button>
    <button onclick="show('auth')">🔐 Login</button>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <!-- HOME -->
    <section id="home">
      <h2>Platform Stats</h2>
      <div class="cards">
        <div class="card">Teachers: <span id="teacherCount">0</span></div>
        <div class="card">Classes: <span id="classCount">0</span></div>
      </div>
    </section>

    <!-- AUTH -->
    <section id="auth" class="hidden">
      <h2>Login / Signup</h2>
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button onclick="signup()">Sign Up</button>
      <button onclick="login()">Login</button>
    </section>

    <!-- TEACHER -->
    <section id="teacher" class="hidden">
      <h2>Teacher Dashboard</h2>

      <div id="teacherPanel" class="hidden">

        <div class="card">
          <h3>Class Controls</h3>
          <button onclick="createClass()">Create Class</button>
          <p id="classCode"></p>
        </div>

        <div class="card">
          <h3>Student Codes</h3>
          <button onclick="generateCodes()">Generate Codes</button>
          <ul id="codesList"></ul>
        </div>

        <div class="card">
          <h3>Subjects</h3>
          <input id="subjectInput" placeholder="New subject">
          <button onclick="addSubject()">Add</button>
          <ul id="subjectList"></ul>
        </div>

        <div class="card">
          <h3>Assignments</h3>
          <input id="assignmentInput" placeholder="New assignment">
          <button onclick="addAssignment()">Add</button>
          <ul id="assignmentList"></ul>
        </div>

      </div>

      <p id="teacherLock">Login as teacher to access</p>
    </section>

    <!-- STUDENT -->
    <section id="student" class="hidden">
      <h2>Student</h2>

      <input id="studentCodeInput" placeholder="Enter code">
      <button onclick="join()">Join</button>

      <div id="studentDash" class="hidden">
        <h3 id="studentName"></h3>
        <p>XP: <span id="xp">0</span></p>
        <p>Level: <span id="level">0</span></p>

        <ul id="studentAssignments"></ul>
      </div>
    </section>

  </main>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
